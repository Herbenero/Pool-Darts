<!DOCTYPE html>
<html>
<head>
  <title>Hellcastle Pool Darts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050608;
      color: #f5f5f5;
      padding: 16px;
      margin: 0 0 90px 0;
    }

    h1 {
      font-size: 32px;
      margin: 0;
      background: linear-gradient(90deg, #d7263d, #f2c94c);
      -webkit-background-clip: text;
      color: transparent;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .crest {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #f2c94c, #d7263d 40%, #050608 80%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(0,0,0,0.7);
    }

    .crest img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .subtitle {
      font-size: 13px;
      color: #bbbbbb;
    }

    .btn {
      padding: 10px 16px;
      margin: 4px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1f1f23;
      color: #f5f5f5;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn:hover {
      background: #d7263d;
      box-shadow: 0 0 10px #d7263d;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .number-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 18px;
      margin: 4px;
    }

    #scoreboard div {
      padding: 8px;
      margin: 4px 0;
      background: #15151a;
      border-left: 4px solid #d7263d;
      border-radius: 4px;
      font-size: 14px;
    }

    .active-player {
      border-left-color: #00e6e6 !important;
      box-shadow: 0 0 10px #00e6e6;
    }

    .hidden { display: none; }

    #turnDisplay {
      font-size: 22px;
      margin-bottom: 8px;
      color: #f2c94c;
    }

    #numbers {
      display: flex;
      flex-wrap: wrap;
      max-width: 360px;
    }

    #navBar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #111118;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      border-top: 2px solid #d7263d;
      z-index: 999;
    }

    #navBar .btn {
      flex: 1;
      margin: 0 4px;
      font-size: 14px;
      padding: 8px 4px;
    }

    .screen {
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hit-flash {
      animation: hitFlash 0.2s ease-out;
    }

    @keyframes hitFlash {
      from { box-shadow: 0 0 0px #00e6e6; }
      to { box-shadow: 0 0 18px #00e6e6; }
    }

    .bull-glow {
      animation: bullGlow 0.6s ease-out;
    }

    @keyframes bullGlow {
      0% { box-shadow: 0 0 0px #f2c94c; }
      50% { box-shadow: 0 0 18px #f2c94c; }
      100% { box-shadow: 0 0 0px #f2c94c; }
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111118;
      color: #f5f5f5;
      width: 200px;
    }

    label {
      font-size: 14px;
      color: #cccccc;
    }

    select {
      background: #111118;
      color: #f5f5f5;
      border-radius: 6px;
      border: 1px solid #333;
      padding: 6px;
    }

    small {
      color: #aaaaaa;
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="crest">
    <!-- Placeholder PNG crest (1x1 transparent). Replace src with your real data URL if you want -->
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+X2f8AAAAASUVORK5CYII=" alt="Hellcastle Crest">
  </div>
  <div>
    <h1>HELLCASTLE POOL DARTS</h1>
    <div class="subtitle">P1: 1–10 • P2: 11–20 • Bull to win</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div id="setup">
    <h3>Add Players</h3>
    <div id="players"></div>
    <button class="btn" onclick="addPlayer()">Add Player</button>
    <br><br>
    <button class="btn" onclick="startGame()">Start Game</button>
  </div>

  <div id="game" class="hidden">
    <h2 id="turnDisplay"></h2>

    <div id="scoreboard"></div>

    <h3>Select Target</h3>
    <div id="numbers"></div>

    <h3>Multiplier</h3>
    <button class="btn" onclick="setMultiplier(1)">Single</button>
    <button class="btn" onclick="setMultiplier(2)">Double</button>
    <button class="btn" onclick="setMultiplier(3)">Triple</button>
    <button class="btn" onclick="recordMiss()">Miss</button>

    <br><br>
    <button class="btn" onclick="undo()">Undo</button>
    <button class="btn" onclick="newGame()">New Game</button>

    <h3>Throws This Turn</h3>
    <div id="throws"></div>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="historyScreen" class="hidden screen">
  <h2 style="color:#f2c94c;">Match History</h2>

  <div id="historyList" style="max-height: 60vh; overflow-y: auto; padding-right: 6px;"></div>

  <button class="btn" onclick="clearHistory()">Clear History</button>
</div>

<!-- TOURNAMENT SCREEN -->
<div id="tournamentScreen" class="hidden screen">
  <h2 style="color:#f2c94c;">Tournament Mode</h2>

  <h3>Setup</h3>
  <label>Mode:</label>
  <select id="tMode">
    <option value="bestof">Best of X</option>
    <option value="firstto">First to X</option>
    <option value="roundrobin">Round Robin</option>
    <option value="bracket">Bracket</option>
  </select>

  <br><br>

  <label>Value:</label>
  <input id="tValue" type="number" value="3" style="width:80px;">

  <br><br>

  <button class="btn" onclick="startTournament()">Start Tournament</button>

  <h3>Matches</h3>
  <div id="tMatchList" style="max-height: 50vh; overflow-y: auto; padding-right: 6px;"></div>

  <div id="tWinner" style="margin-top:20px; font-size:20px; color:#f2c94c;"></div>
</div>

<!-- STATS SCREEN -->
<div id="statsScreen" class="hidden screen">
  <h2 style="color:#f2c94c;">Stats</h2>

  <h3>Lifetime Stats</h3>
  <div id="lifetimeStats" style="margin-bottom:20px;"></div>

  <h3>Player Comparison</h3>
  <div id="playerStats"></div>
</div>

<!-- MATCH CARD TEMPLATE -->
<template id="matchCardTemplate">
  <div style="padding: 10px; margin: 10px 0; background: #15151a; border-left: 4px solid #00e6e6; border-radius:4px;">
    <strong class="mPlayers"></strong><br>
    <small class="mStatus"></small>
  </div>
</template>

<!-- BOTTOM NAV -->
<div id="navBar">
  <button class="btn" onclick="showScreen('gameScreen')">Game</button>
  <button class="btn" onclick="showScreen('historyScreen')">History</button>
  <button class="btn" onclick="showScreen('tournamentScreen')">Tournament</button>
  <button class="btn" onclick="showScreen('statsScreen')">Stats</button>
</div>

<script>
/* ============================
   CORE GAME LOGIC
   ============================ */

let players = [];
let playerState = [];
let currentPlayer = 0;
let dartCount = 0;
let multiplier = 1;
let history = [];
let tournament = null;

function addPlayer() {
  const div = document.createElement("div");
  div.style.marginBottom = "6px";
  div.innerHTML = `<input placeholder="Player name">`;
  document.getElementById("players").appendChild(div);
}

function startGame() {
  const inputs = document.querySelectorAll("#players input");
  players = [...inputs].map(i => i.value.trim()).filter(v => v.length > 0);

  if (players.length !== 2) {
    alert("Pool Darts requires exactly 2 players");
    return;
  }

  playerState = [
    { name: players[0], currentTarget: 1, completed: [], mustHitBull: false },
    { name: players[1], currentTarget: 11, completed: [], mustHitBull: false }
  ];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  buildNumberButtons();
  updateTurnDisplay();
  updateScoreboard();
}

function buildNumberButtons() {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  for (let i = 1; i <= 20; i++) {
    const btn = document.createElement("button");
    btn.className = "btn number-btn";
    btn.textContent = i;
    btn.onclick = () => recordHit(i);
    container.appendChild(btn);
  }

  const bull = document.createElement("button");
  bull.className = "btn number-btn";
  bull.textContent = "Bull";
  bull.id = "bullButton";
  bull.onclick = () => recordHit("Bull");
  container.appendChild(bull);
}

function setMultiplier(m) {
  multiplier = m;
}

function recordHit(target) {
  const p = playerState[currentPlayer];

  if (target === "Bull" && p.mustHitBull) {
    history.push({ player: currentPlayer, playerName: players[currentPlayer], target, multiplier });
    playBullSound();
    bullGlow();
    endGame(p.name);
    return;
  }

  if (p.mustHitBull && target !== "Bull") {
    alert("You must hit Bull to win");
    return;
  }

  if (target == p.currentTarget) {
    p.completed.push(target);

    if ((p.currentTarget === 10 && currentPlayer === 0) ||
        (p.currentTarget === 20 && currentPlayer === 1)) {
      p.mustHitBull = true;
    } else {
      p.currentTarget++;
    }

    history.push({ player: currentPlayer, playerName: players[currentPlayer], target, multiplier });
    playHitSound();
    hitFlash();

    dartCount++;
    updateThrows();
    updateScoreboard();

    if (dartCount === 3) nextPlayer();
    return;
  }

  alert("Wrong target — hit your current number");
}

function recordMiss() {
  history.push({ player: currentPlayer, playerName: players[currentPlayer], target: "Miss", multiplier: 0 });
  playMissSound();

  dartCount++;
  updateThrows();

  if (dartCount === 3) nextPlayer();
}

function undo() {
  if (history.length === 0) return;

  const last = history.pop();
  const p = playerState[last.player];

  if (last.target !== "Miss") {
    if (last.target === "Bull") {
      p.mustHitBull = true;
    } else {
      p.completed.pop();
      p.currentTarget = last.target;
      p.mustHitBull = false;
    }
  }

  if (last.player === currentPlayer) {
    dartCount--;
  } else {
    currentPlayer = last.player;
    dartCount = 2;
  }

  updateTurnDisplay();
  updateThrows();
  updateScoreboard();
}

function nextPlayer() {
  dartCount = 0;
  currentPlayer = (currentPlayer + 1) % 2;
  updateTurnDisplay();
  updateThrows();
}

function updateTurnDisplay() {
  if (!players.length) return;
  document.getElementById("turnDisplay").textContent =
    "Turn: " + players[currentPlayer];
}

function updateThrows() {
  const recent = history.filter(h => h.player === currentPlayer).slice(-dartCount);
  document.getElementById("throws").textContent =
    recent.map(r => `${r.target} x${r.multiplier}`).join(", ");
}

function updateScoreboard() {
  const sb = document.getElementById("scoreboard");
  sb.innerHTML = "";

  playerState.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = i === currentPlayer ? "active-player" : "";
    div.innerHTML = `<strong>${p.name}</strong> — Next: ${
      p.mustHitBull ? "Bull" : p.currentTarget
    }`;
    sb.appendChild(div);
  });
}

function newGame() {
  location.reload();
}

/* ============================
   MATCH HISTORY SYSTEM
   ============================ */

function saveMatchToHistory(winner) {
  const match = {
    timestamp: new Date().toLocaleString(),
    players: players,
    winner: winner,
    throws: [...history],
    stats: calculateMatchStats()
  };

  let stored = JSON.parse(localStorage.getItem("poolDartsHistory") || "[]");
  stored.push(match);
  localStorage.setItem("poolDartsHistory", JSON.stringify(stored));
}

function loadHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  let stored = JSON.parse(localStorage.getItem("poolDartsHistory") || "[]");

  if (stored.length === 0) {
    list.innerHTML = "<p>No matches recorded yet.</p>";
    return;
  }

  stored.forEach((match) => {
    const div = document.createElement("div");
    div.style.padding = "10px";
    div.style.margin = "10px 0";
    div.style.background = "#15151a";
    div.style.borderLeft = "4px solid #d7263d";
    div.style.cursor = "pointer";
    div.style.borderRadius = "4px";

    div.innerHTML = `
      <strong>${match.winner}</strong> won<br>
      <small>${match.timestamp}</small>
    `;

    div.onclick = () => showMatchDetails(match);
    list.appendChild(div);
  });
}

function showMatchDetails(match) {
  const details = `
    <h3>${match.winner} Wins</h3>
    <p><strong>Players:</strong> ${match.players.join(" vs ")}</p>
    <p><strong>Time:</strong> ${match.timestamp}</p>
    <p><strong>Total Throws:</strong> ${match.throws.length}</p>
    <p><strong>Accuracy:</strong> ${match.stats.accuracy}%</p>
    <p><strong>Miss Rate:</strong> ${match.stats.missRate}%</p>
    <p><strong>Singles/Doubles/Triples:</strong> ${match.stats.singles} / ${match.stats.doubles} / ${match.stats.triples}</p>
  `;

  document.getElementById("historyList").innerHTML = details;
}

function clearHistory() {
  if (confirm("Clear all match history?")) {
    localStorage.removeItem("poolDartsHistory");
    loadHistory();
  }
}

function calculateMatchStats() {
  let singles = 0, doubles = 0, triples = 0, misses = 0;

  history.forEach(h => {
    if (h.target === "Miss") misses++;
    else if (h.multiplier === 1) singles++;
    else if (h.multiplier === 2) doubles++;
    else if (h.multiplier === 3) triples++;
  });

  const total = history.length;
  const accuracy = total === 0 ? 0 : Math.round(((total - misses) / total) * 100);
  const missRate = total === 0 ? 0 : Math.round((misses / total) * 100);

  return { singles, doubles, triples, misses, accuracy, missRate };
}

/* ============================
   TOURNAMENT ENGINE
   ============================ */

function startTournament() {
  if (players.length !== 2) {
    alert("Start a game and set players first.");
    return;
  }

  const mode = document.getElementById("tMode").value;
  const value = parseInt(document.getElementById("tValue").value) || 1;

  tournament = {
    mode,
    value,
    players: [...players],
    matches: [],
    currentMatchIndex: 0,
    wins: { [players[0]]: 0, [players[1]]: 0 },
    active: true
  };

  generateTournamentMatches();
  renderTournamentMatches();
}

function generateTournamentMatches() {
  const p1 = players[0];
  const p2 = players[1];

  tournament.matches = [];

  if (tournament.mode === "bestof") {
    const total = tournament.value % 2 === 1 ? tournament.value : tournament.value + 1;
    for (let i = 0; i < total; i++) {
      tournament.matches.push({ p1, p2, winner: null });
    }
  }

  if (tournament.mode === "firstto") {
    tournament.matches.push({ p1, p2, winner: null });
  }

  if (tournament.mode === "roundrobin") {
    for (let i = 0; i < tournament.value; i++) {
      tournament.matches.push({ p1, p2, winner: null });
    }
  }

  if (tournament.mode === "bracket") {
    tournament.matches.push({ p1, p2, winner: null });
  }
}

function renderTournamentMatches() {
  const list = document.getElementById("tMatchList");
  list.innerHTML = "";

  const template = document.getElementById("matchCardTemplate");

  tournament.matches.forEach((m, i) => {
    const card = template.content.cloneNode(true);
    card.querySelector(".mPlayers").textContent = `${m.p1} vs ${m.p2}`;
    card.querySelector(".mStatus").textContent =
      m.winner ? `Winner: ${m.winner}` :
      i === tournament.currentMatchIndex ? "In Progress" : "Pending";

    list.appendChild(card);
  });
}

function recordTournamentWin(winner) {
  if (!tournament || !tournament.active) return;

  const match = tournament.matches[tournament.currentMatchIndex];
  match.winner = winner;

  tournament.wins[winner]++;

  if (tournament.mode === "bestof") {
    const needed = Math.ceil(tournament.matches.length / 2);
    if (tournament.wins[winner] >= needed) {
      endTournament(winner);
      return;
    }
  }

  if (tournament.mode === "firstto") {
    if (tournament.wins[winner] >= tournament.value) {
      endTournament(winner);
      return;
    }
    tournament.matches.push({ p1: players[0], p2: players[1], winner: null });
  }

  if (tournament.mode === "roundrobin") {
    if (tournament.currentMatchIndex + 1 >= tournament.matches.length) {
      const finalWinner =
        tournament.wins[players[0]] > tournament.wins[players[1]]
          ? players[0]
          : players[1];
      endTournament(finalWinner);
      return;
    }
  }

  if (tournament.mode === "bracket") {
    endTournament(winner);
    return;
  }

  tournament.currentMatchIndex++;
  renderTournamentMatches();
}

function endTournament(winner) {
  tournament.active = false;
  document.getElementById("tWinner").textContent =
    `🏆 Tournament Winner: ${winner}`;
  renderTournamentMatches();
}

/* ============================
   STATS ENGINE
   ============================ */

function loadStats() {
  const lifetimeDiv = document.getElementById("lifetimeStats");
  const playerDiv = document.getElementById("playerStats");

  const stored = JSON.parse(localStorage.getItem("poolDartsHistory") || "[]");

  if (stored.length === 0) {
    lifetimeDiv.innerHTML = "<p>No matches played yet.</p>";
    playerDiv.innerHTML = "";
    return;
  }

  let totalMatches = stored.length;
  let totalThrows = 0;
  let totalSingles = 0, totalDoubles = 0, totalTriples = 0, totalMisses = 0;

  stored.forEach(match => {
    totalThrows += match.throws.length;
    totalSingles += match.stats.singles;
    totalDoubles += match.stats.doubles;
    totalTriples += match.stats.triples;
    totalMisses += match.stats.misses;
  });

  const totalHits = totalSingles + totalDoubles + totalTriples;
  const accuracy = totalThrows === 0 ? 0 : Math.round((totalHits / totalThrows) * 100);
  const missRate = totalThrows === 0 ? 0 : Math.round((totalMisses / totalThrows) * 100);

  lifetimeDiv.innerHTML = `
    <p><strong>Matches Played:</strong> ${totalMatches}</p>
    <p><strong>Total Throws:</strong> ${totalThrows}</p>
    <p><strong>Accuracy:</strong> ${accuracy}%</p>
    <p><strong>Miss Rate:</strong> ${missRate}%</p>
    <p><strong>Singles/Doubles/Triples:</strong> ${totalSingles} / ${totalDoubles} / ${totalTriples}</p>
  `;

  let playerStats = {};
  stored.forEach(match => {
    match.players.forEach(p => {
      if (!playerStats[p]) {
        playerStats[p] = {
          matches: 0,
          wins: 0,
          throws: 0,
          singles: 0,
          doubles: 0,
          triples: 0,
          misses: 0
        };
      }
    });

    match.players.forEach(p => {
      playerStats[p].matches++;
      if (match.winner === p) playerStats[p].wins++;
    });

    match.throws.forEach(t => {
      const name = t.playerName || match.players[t.player] || null;
      if (!name || !playerStats[name]) return;

      playerStats[name].throws++;
      if (t.target === "Miss") playerStats[name].misses++;
      else if (t.multiplier === 1) playerStats[name].singles++;
      else if (t.multiplier === 2) playerStats[name].doubles++;
      else if (t.multiplier === 3) playerStats[name].triples++;
    });
  });

  playerDiv.innerHTML = "";
  Object.keys(playerStats).forEach(name => {
    const ps = playerStats[name];
    const hits = ps.singles + ps.doubles + ps.triples;
    const acc = ps.throws === 0 ? 0 : Math.round((hits / ps.throws) * 100);

    const div = document.createElement("div");
    div.style.padding = "10px";
    div.style.margin = "10px 0";
    div.style.background = "#15151a";
    div.style.borderLeft = "4px solid #f2c94c";
    div.style.borderRadius = "4px";

    div.innerHTML = `
      <strong>${name}</strong><br>
      Matches: ${ps.matches}, Wins: ${ps.wins}<br>
      Throws: ${ps.throws}, Accuracy: ${acc}%<br>
      Singles/Doubles/Triples: ${ps.singles}/${ps.doubles}/${ps.triples}<br>
      Misses: ${ps.misses}
    `;

    playerDiv.appendChild(div);
  });
}

/* ============================
   SCREEN SWITCHING
   ============================ */

function showScreen(screen) {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("historyScreen").classList.add("hidden");
  document.getElementById("tournamentScreen").classList.add("hidden");
  document.getElementById("statsScreen").classList.add("hidden");

  document.getElementById(screen).classList.remove("hidden");

  if (screen === "historyScreen") loadHistory();
  if (screen === "statsScreen") loadStats();
}

/* ============================
   END GAME
   ============================ */

function endGame(winner) {
  saveMatchToHistory(winner);

  if (tournament && tournament.active) {
    recordTournamentWin(winner);
  }

  playWinSound();
  alert(winner + " wins the game!");
  newGame();
}

/* ============================
   SIMPLE SOUND EFFECTS (WEB AUDIO)
   ============================ */

function playTone(freq, duration, type = "sine", volume = 0.2) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    setTimeout(() => {
      osc.stop();
      ctx.close();
    }, duration);
  } catch (e) {
    // audio not critical
  }
}

function playHitSound() {
  playTone(880, 80, "square", 0.15);
}

function playMissSound() {
  playTone(220, 120, "sawtooth", 0.12);
}

function playBullSound() {
  playTone(660, 80, "sine", 0.18);
  setTimeout(() => playTone(990, 120, "sine", 0.18), 90);
}

function playWinSound() {
  playTone(523, 120, "triangle", 0.2);
  setTimeout(() => playTone(659, 120, "triangle", 0.2), 130);
  setTimeout(() => playTone(784, 160, "triangle", 0.2), 260);
}

/* ============================
   ANIMATIONS HELPERS
   ============================ */

function hitFlash() {
  const board = document.getElementById("numbers");
  if (!board) return;
  board.classList.add("hit-flash");
  setTimeout(() => board.classList.remove("hit-flash"), 200);
}

function bullGlow() {
  const bull = document.getElementById("bullButton");
  if (!bull) return;
  bull.classList.add("bull-glow");
  setTimeout(() => bull.classList.remove("bull-glow"), 600);
}
</script>

</body>
</html>
